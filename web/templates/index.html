<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Quotes Recommendation Bot</title>
    <link rel="stylesheet" href="/static/style.css">
    <meta name="description" content="AI-powered Quote recommendation chatbot that understands your mood and delivers personalized quotes">
  </head>
  <body>
    <div class="chat">
      <header class="chat-header">
        <h1>✨ Quotes Recommendation Bot</h1>
        <p class="subtitle">Get personalized quotes based on your mood</p>
      </header>
      <div id="messages" class="messages"></div>
      <div class="input-section">
        <div class="input">
          <input id="user-input" placeholder="Type a mood or request a quote..." autocomplete="off" />
          <button id="send">Send</button>
          <div id="spinner" class="spinner" aria-hidden="true"></div>
        </div>
      </div>
    </div>

    <script>
      const messagesEl = document.getElementById('messages');
      const inputEl = document.getElementById('user-input');
      const sendBtn = document.getElementById('send');
      const spinner = document.getElementById('spinner');

      function makeAvatar(who){
        const avatar = document.createElement('span');
        avatar.className = 'avatar ' + who;
        avatar.textContent = who === 'user' ? '🙂' : '✨';
        return avatar;
      }

      function appendMessage(text, who='bot'){
        const div = document.createElement('div');
        div.className = 'msg ' + (who === 'user' ? 'user' : 'bot');
        div.appendChild(makeAvatar(who));
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.textContent = text;
        const meta = document.createElement('div');
        meta.className = 'meta';
        const time = new Date().toLocaleTimeString();
        meta.textContent = time;
        div.appendChild(bubble);
        div.appendChild(meta);
        messagesEl.appendChild(div);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      function appendSuggestions(suggestions) {
        const sugContainer = document.createElement('div');
        sugContainer.className = 'suggestions';
        suggestions.forEach(s => {
          const btn = document.createElement('button');
          btn.className = 'suggestion-btn';
          btn.textContent = s.emoji + ' ' + s.text;
          btn.onclick = () => {
            inputEl.value = s.value || s.text;
            sendMessage();
          };
          sugContainer.appendChild(btn);
        });
        messagesEl.appendChild(sugContainer);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      async function sendMessage(){
        const text = inputEl.value.trim();
        if(!text) return;
        appendMessage(text,'user');
        inputEl.value = '';
        sendBtn.disabled = true;
        spinner.style.display = 'inline-block';

        try{
          const res = await fetch('/api/message', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ sender: 'web_user', message: text })
          });
          const data = await res.json();
          if(Array.isArray(data) && data.length){
            data.forEach(item => {
              if(item.text) appendMessage(item.text,'bot');
            });
          } else if(data.error){
            appendMessage('Error: ' + data.error,'bot');
          } else {
            appendMessage('No response from the bot.','bot');
          }
        } catch(err){
          appendMessage('Connection error – is the backend running?','bot');
          console.error(err);
        } finally {
          sendBtn.disabled = false;
          spinner.style.display = 'none';
        }
      }


      sendBtn.addEventListener('click', sendMessage);
      inputEl.addEventListener('keydown', (e)=>{ if(e.key === 'Enter') sendMessage(); });

      // Initial greeting with enhanced suggestions
      appendMessage("Hello! 😊 Ask for a quote or tell me how you're feeling (e.g. sad, stressed, anxious). Click a suggestion to start.");
      
      const suggestions = [
        { emoji: '💪', text: 'Motivate me', value: 'motivate me' },
        { emoji: '✨', text: 'Inspire me', value: 'inspire me' },
        { emoji: '❤️', text: 'Love quotes', value: 'love quotes' },
        { emoji: '🎉', text: 'Make me laugh', value: 'make me laugh' }
      ];
      appendSuggestions(suggestions);
    </script>
  </body>
</html>
